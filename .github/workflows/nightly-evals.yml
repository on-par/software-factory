name: Nightly Evals

on:
  schedule:
    - cron: '0 8 * * *'   # nightly, 08:00 UTC
  workflow_dispatch:

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Full eval run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run eval -- --report eval-report.json --baseline evals/baseline.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval-report.json
