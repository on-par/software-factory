name: Weekly Prompt Evals

on:
  schedule:
    - cron: '0 8 * * 1' # weekly on Monday, 08:00 UTC
  workflow_dispatch:

jobs:
  evals:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Preflight — require ANTHROPIC_API_KEY
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY repo secret is not configured — the Claude CLI cannot authenticate, so the real eval run would fail on every case. Add the secret in repo settings."
            exit 1
          fi

      - name: Prompt regression eval run
        id: eval
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: >
          npm run eval -- --judge-k 3
          --plan-model claude-fable-5
          --judge-model claude-sonnet-5
          --report eval-report.json
          --baseline evals/baseline.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval-report.json

      - name: Download previous eval history
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ids=$(gh run list --workflow nightly-evals.yml --branch main --status completed \
            --limit 20 --json databaseId --jq '.[].databaseId')
          : > history.jsonl
          for id in $ids; do
            if gh run download "$id" -n eval-history -D prev 2>/dev/null; then
              cp prev/history.jsonl history.jsonl
              break
            fi
          done

      - name: Append + render trend
        if: always()
        run: |
          npm run eval-history -- \
            --report eval-report.json \
            --history history.jsonl \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload eval history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-history
          path: history.jsonl

      - name: Build regression issue body
        if: steps.eval.outcome == 'failure'
        run: |
          npm run regression-issue -- \
            --report eval-report.json \
            --baseline evals/baseline.json \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --out regression-issue.md

      - name: File or update regression issue
        if: steps.eval.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f regression-issue.md ]; then
            echo "no regression body produced — nothing to file"
            exit 0
          fi
          existing=$(gh issue list --state open --label evals \
            --json number,title \
            --jq '[.[] | select(.title == "Weekly prompt eval regression" or .title == "Weekly eval regression" or .title == "Nightly eval regression")][0].number // empty')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body-file regression-issue.md
            gh issue comment "$existing" \
              --body "Refreshed from run $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "updated existing regression issue #$existing"
          else
            gh issue create --label evals \
              --title "Weekly prompt eval regression" \
              --body-file regression-issue.md
          fi

      - name: Fail the job on eval regression
        if: steps.eval.outcome == 'failure'
        run: |
          echo "weekly prompt eval step failed (regression or infra) — marking job red"
          exit 1
