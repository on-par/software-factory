name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Knip
        run: npm run knip

      - name: Test & coverage
        run: npm run test

      - name: Coverage ratchet
        run: npm run coverage-ratchet

      - name: Coverage summary
        if: ${{ !cancelled() }}
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e '
              const t = require("./coverage/coverage-summary.json").total;
              const row = (k) => `| ${k} | ${t[k].pct}% | ${t[k].covered}/${t[k].total} |`;
              console.log("## Coverage");
              console.log("");
              console.log("| Metric | Coverage | Covered/Total |");
              console.log("| --- | --- | --- |");
              for (const k of ["lines", "statements", "branches", "functions"]) console.log(row(k));
            ' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No coverage summary found (coverage/coverage-summary.json missing)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/coverage-summary.json
            coverage/lcov.info
            coverage/cobertura-coverage.xml
          if-no-files-found: warn

      - name: Eval (deterministic, stub)
        run: npm run eval -- --stub

  quickstart:
    name: quickstart-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Quickstart smoke (pack → install → factory init)
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/quickstart-smoke.sh

  auto-merge-sweep-test:
    name: auto-merge-sweep-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Merge-exit-code regression test
        run: bash scripts/auto-merge-sweep.test.sh
      - name: filter-green-prs unit test
        run: bash scripts/filter-green-prs.test.sh
      - name: repo-merge-settings unit test
        run: bash scripts/repo-merge-settings.test.sh
